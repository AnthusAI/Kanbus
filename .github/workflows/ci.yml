name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:

permissions:
  contents: write

jobs:
  python:
    runs-on: ubuntu-latest
    outputs:
      coverage_percent: ${{ steps.python_coverage.outputs.percentage }}
      coverage_color: ${{ steps.python_coverage.outputs.color }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Build kbsc for integration tests
        run: |
          cd rust
          cargo build --bin kbsc --no-default-features
          echo "KBSC_BINARY=$(pwd)/target/debug/kbsc" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python

      - name: Run Python quality gates
        run: |
          cd python
          black --check .
          ruff check .
          mkdir -p ../coverage-python
          python -m coverage erase
          python -m coverage run --source=kanbus -m pytest
          KANBUS_ENABLE_COVERAGE_HELPER=0 python -m coverage run --append --source=kanbus -m behave --tags "~wip ~console-server"
          python -m coverage xml -o ../coverage-python/coverage.xml

      - name: Capture Python coverage
        id: python_coverage
        run: |
          output=$(python tools/coverage_badge.py coverage-python/coverage.xml)
          echo "$output" >> "$GITHUB_OUTPUT"

      - name: Upload Python coverage XML
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-python-xml
          path: coverage-python/coverage.xml

      - name: Check spec parity
        env:
          KANBUS_PARITY_STRICT: "0"
        run: python tools/check_spec_parity.py

  python-install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Verify Python installation
        run: python tools/verify_python_installation.py

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      coverage_percent: ${{ steps.rust_coverage.outputs.percentage }}
      coverage_color: ${{ steps.rust_coverage.outputs.color }}
    env:
      RUST_BACKTRACE: 1
      CARGO_HTTP_TIMEOUT: 120
      CARGO_NET_RETRY: 5
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node (for embedded console assets build)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install console dependencies
        run: |
          cd apps/console
          npm ci

      - name: Install and build shared UI package
        run: |
          cd packages/ui
          npm ci
          npm run build

      - name: Build console assets (reuse in coverage)
        run: |
          cd apps/console
          npm run build

      - name: Sync console assets into Rust bundle
        run: |
          rm -rf rust/embedded_assets/console
          cp -R apps/console/dist rust/embedded_assets/console

      - name: Verify console assets bundled for crate
        run: |
          test -f rust/embedded_assets/console/index.html
          (cd rust && cargo package --locked --list) | grep -Eq '^embedded_assets/console/index.html$'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Run Rust quality gates
        run: |
          cd rust
          set -x
          time cargo fmt --check
          timeout 1500s time cargo clippy --locked -- -D warnings
          timeout 1800s time cargo test --locked
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@385db9cc6bf65d19775b02084a4b698eaca9a4f2 # v2
        with:
          tool: cargo-llvm-cov@0.6.11

      - name: Run Rust coverage
        run: |
          cd rust
          mkdir -p ../coverage-rust
          set -x
          heartbeat() { while sleep 60; do echo "[heartbeat] rust coverage running $(date -u)"; done; }
          heartbeat &
          hb_pid=$!
          timeout 1800s bash -lc 'time KANBUS_CUCUMBER_INCLUDE_CONSOLE=1 stdbuf -oL cargo llvm-cov --locked --no-report --all-features --lib --bins --tests --ignore-filename-regex "features/steps/.*"'
          timeout 600s bash -lc 'time stdbuf -oL cargo llvm-cov report --locked --cobertura --output-path ../coverage-rust/cobertura.xml'
          kill $hb_pid || true

      - name: Capture Rust coverage
        id: rust_coverage
        run: |
          output=$(python tools/coverage_badge.py coverage-rust/cobertura.xml)
          echo "$output" >> "$GITHUB_OUTPUT"

      - name: Upload Rust coverage XML
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-rust-xml
          path: coverage-rust/cobertura.xml

  coverage-ratchet:
    runs-on: ubuntu-latest
    needs: [python, rust]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Download Python coverage XML
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-python-xml
          path: coverage-python

      - name: Download Rust coverage XML
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-rust-xml
          path: coverage-rust

      - name: Assert coverage artifacts exist
        run: |
          test -s coverage-python/coverage.xml
          test -s coverage-rust/cobertura.xml

      - name: Enforce coverage ratchet
        run: |
          python tools/coverage_ratchet.py \
            --python-xml coverage-python/coverage.xml \
            --rust-xml coverage-rust/cobertura.xml \
            --baseline-file config/coverage-baselines.json \
            --json > coverage-ratchet.json
          cat coverage-ratchet.json

      - name: Enforce changed-files coverage gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF_NAME: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags origin "$BASE_REF_NAME" --depth=1
            base_ref="origin/$BASE_REF_NAME"
          else
            base_ref="$BEFORE_SHA"
          fi
          python tools/coverage_changed_files_gate.py \
            --python-xml coverage-python/coverage.xml \
            --rust-xml coverage-rust/cobertura.xml \
            --config config/coverage-changed-files.json \
            --base-ref "$base_ref" \
            --head-ref "$HEAD_SHA" \
            --json > coverage-changed-files.json
          cat coverage-changed-files.json

      - name: Publish coverage parity report
        run: |
          python tools/coverage_parity_report.py \
            --python-xml coverage-python/coverage.xml \
            --rust-xml coverage-rust/cobertura.xml \
            --limit 25
          python tools/coverage_parity_report.py \
            --python-xml coverage-python/coverage.xml \
            --rust-xml coverage-rust/cobertura.xml \
            --limit 25 \
            --json > coverage-parity-report.json

      - name: Upload coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-ratchet-reports
          path: |
            coverage-ratchet.json
            coverage-changed-files.json
            coverage-parity-report.json

  rust-console-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Run Rust @console parity scenarios
        run: |
          cd rust
          KANBUS_CUCUMBER_ONLY_CONSOLE=1 cargo test --locked --test cucumber -- --fail-fast

  python-console-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Build kbsc for console parity tests
        run: |
          cd rust
          cargo build --bin kbsc --no-default-features
          echo "KBSC_BINARY=$(pwd)/target/debug/kbsc" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python

      - name: Run Python @console-server parity scenarios
        run: |
          cd python
          KANBUS_ENABLE_COVERAGE_HELPER=0 python -m behave --tags "@console-server"

  console-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install console dependencies
        run: |
          cd apps/console
          npm install

      - name: Install Playwright browsers
        run: |
          cd apps/console
          npx playwright install --with-deps

      - name: Run console UI specs
        run: |
          cd apps/console
          npm run test:ui

      - name: Build console assets for downstream jobs
        run: |
          cd apps/console
          npm run build

      - name: Upload console assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: console-dist
          path: apps/console/dist

  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Run benchmark regression check
        run: python tools/check_benchmarks.py

  binary-smoke:
    runs-on: ubuntu-latest
    needs: [rust, console-ui]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Download console UI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: console-dist
          path: apps/console/dist

      - name: Sync console assets into Rust bundle
        run: |
          rm -rf rust/embedded_assets/console
          cp -R apps/console/dist rust/embedded_assets/console

      - name: Build release binaries
        run: |
          cd rust
          cargo build --release --bin kbs --bin kbsc --features embed-assets

      - name: Prepare binaries for Docker test
        run: |
          mkdir -p dist
          cp rust/target/release/kbs dist/kbs
          cp rust/target/release/kbsc dist/kbsc

      - name: Run Docker smoke test
        continue-on-error: true
        run: tools/test_prebuilt_binaries_docker.sh dist/kbs dist/kbsc

  beads-interop:
    runs-on: ubuntu-latest
    needs:
      [
        python,
        python-install,
        rust,
        coverage-ratchet,
        rust-console-parity,
        python-console-parity,
        console-ui,
        performance,
        binary-smoke,
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node (for embedded console assets build)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22.x"

      - name: Install Beads build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libicu-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python

      - name: Install and build shared UI package
        run: |
          cd packages/ui
          npm ci
          npm run build

      - name: Install console dependencies
        working-directory: apps/console
        run: npm ci

      - name: Build console assets
        env:
          # Matches console-ui job; ensures kbsc sees embedded assets under apps/console/dist
          NODE_ENV: production
        working-directory: apps/console
        run: |
          # Ensure shared UI package is built and resolvable
          (cd ../../packages/ui && npm run build)
          npm run build

      - name: Build Rust release binary
        run: |
          binary=$(python tools/build_rust_release.py)
          echo "KANBUS_RUST_BINARY=$binary" >> "$GITHUB_ENV"

      - name: Run Beads interoperability suite
        run: python tools/run_beads_interop_suite.py --rust-binary "$KANBUS_RUST_BINARY"

  badges:
    needs: [python, rust]
    if: ${{ always() && github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare badges directory
        run: mkdir -p badges

      - name: Build Python CI badge
        uses: emibcn/badge-action@afa1859d3d02b7b55f3410c7345c3e353e2d3783 # v2
        with:
          label: python
          status: ${{ needs.python.result == 'success' && 'passing' || 'failing' }}
          color: ${{ needs.python.result == 'success' && 'green' || 'red' }}
          path: badges/python-ci.svg

      - name: Build Python coverage badge
        uses: emibcn/badge-action@afa1859d3d02b7b55f3410c7345c3e353e2d3783 # v2
        with:
          label: python coverage
          status: ${{ needs.python.outputs.coverage_percent }}%
          color: ${{ needs.python.outputs.coverage_color }}
          path: badges/python-coverage.svg

      - name: Build Rust CI badge
        uses: emibcn/badge-action@afa1859d3d02b7b55f3410c7345c3e353e2d3783 # v2
        with:
          label: rust
          status: ${{ needs.rust.result == 'success' && 'passing' || 'failing' }}
          color: ${{ needs.rust.result == 'success' && 'green' || 'red' }}
          path: badges/rust-ci.svg

      - name: Build Rust coverage badge
        if: needs.rust.result == 'success'
        uses: emibcn/badge-action@afa1859d3d02b7b55f3410c7345c3e353e2d3783 # v2
        with:
          label: rust coverage
          status: ${{ needs.rust.outputs.coverage_percent }}%
          color: ${{ needs.rust.outputs.coverage_color }}
          path: badges/rust-coverage.svg

      - name: Build Rust coverage badge (failed)
        if: needs.rust.result != 'success'
        uses: emibcn/badge-action@afa1859d3d02b7b55f3410c7345c3e353e2d3783 # v2
        with:
          label: rust coverage
          status: failed
          color: red
          path: badges/rust-coverage.svg

      - name: Publish badges branch
        uses: peaceiris/actions-gh-pages@e9c66a37f080288a11235e32cbe2dc5fb3a679cc # v4
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: badges
          publish_dir: badges
