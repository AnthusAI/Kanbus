project_directory: project
ignore_paths:
  - features/project
console_port: 4242
project_key: kbs

hierarchy:
  - initiative
  - epic
  - task
  - sub-task
types:
  - bug
  - story
  - chore
  - event

workflows:
  default:
    backlog: [open, closed]
    open: [in_progress, closed, backlog]
    in_progress: [open, blocked, closed, backlog]
    blocked: [in_progress, closed, backlog]
    closed: [open, backlog]
    Discovery: [open, backlog]
    done: [open, backlog]
    todo: [open, backlog]
    deferred: [open, backlog]
  epic:
    backlog: [open, closed]
    open: [in_progress, closed, done, backlog]
    in_progress: [open, closed, done, backlog]
    closed: [open, backlog]
    done: [open, backlog]

statuses:
  - key: backlog
    name: Backlog
    category: To do
    collapsed: true
  - key: todo
    name: Todo (Legacy)
    category: To do
    collapsed: true
  - key: Discovery
    name: Discovery
    category: To do
    collapsed: false
  - key: open
    name: Ready
    category: To do
  - key: in_progress
    name: In Progress
    category: In progress
  - key: blocked
    name: Blocked
    category: In progress
    collapsed: true
  - key: deferred
    name: Deferred (Legacy)
    category: To do
    collapsed: true
  - key: closed
    name: Done
    category: Done
    collapsed: true
  - key: done
    name: Done (Legacy)
    category: Done
    collapsed: true

categories:
  - name: To do
    color: grey
  - name: In progress
    color: blue
  - name: Done
    color: green

transition_labels:
  default:
    backlog:
      open: Start discovery
      closed: Drop
    open:
      in_progress: Start work
      closed: Drop
      backlog: Back to backlog
    in_progress:
      open: Pause
      blocked: Block
      closed: Complete
      backlog: Back to backlog
    blocked:
      in_progress: Unblock
      closed: Drop
      backlog: Back to backlog
    closed:
      open: Reopen
      backlog: Back to backlog
    Discovery:
      open: Start work
      backlog: Back to backlog
    done:
      open: Reopen
      backlog: Back to backlog
    todo:
      open: Start work
      backlog: Back to backlog
    deferred:
      open: Resume
      backlog: Back to backlog
  epic:
    backlog:
      open: Start
      closed: Drop
    open:
      in_progress: Start
      closed: Complete
      done: Complete
      backlog: Back to backlog
    in_progress:
      open: Pause
      closed: Complete
      done: Complete
      backlog: Back to backlog
    closed:
      open: Reopen
      backlog: Back to backlog
    done:
      open: Reopen
      backlog: Back to backlog

initial_status: open
priorities:
  0:
    name: critical
    color: red
  1:
    name: high
    color: bright_red
  2:
    name: medium
    color: yellow
  3:
    name: low
    color: blue
  4:
    name: trivial
    color: white
default_priority: 2

type_colors:
  initiative: bright_blue
  epic: magenta
  task: blue
  sub-task: bright_cyan
  bug: red
  story: yellow
  chore: green
  event: bright_blue

beads_compatibility: false

# Snyk vulnerability synchronization (optional). Secrets go in .env, not here.
# snyk:
#   org_id: <uuid from app.snyk.io/org/<slug>/manage/settings>
#   min_severity: high          # critical | high | medium | low (default: low)
#   parent_epic: <kanbus-id>    # optional: attach imported bugs under this epic

# GitHub security synchronization (optional). Secrets go in .env, not here.
# github_security:
#   repo: owner/repo            # optional: defaults from git remote origin
#   dependabot:
#     min_severity: high        # critical | high | medium | low (default: low)
#     state: open               # open | fixed | dismissed | auto_dismissed (default: open)
#     parent_epic: <kanbus-id>  # optional: attach imported findings under this epic

# Jira synchronization (optional). Secrets go in .env, not here.
jira:
  url: https://equity.atlassian.net
  project_key: AQA
  sync_direction: pull          # pull | push | both
  type_mappings:                # Jira issue type name → Kanbus issue type
    Story: story
    Bug: bug
    Task: task
    Workstream: epic
    Sub-task: sub-task
